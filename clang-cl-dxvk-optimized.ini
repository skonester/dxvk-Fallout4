# clang-cl-dxvk-optimized.ini
# Native Windows clang-cl configuration for collecting LLVM optimization remarks.

[binaries]
c = 'clang-cl.exe'
cpp = 'clang-cl.exe'
ar = 'llvm-lib.exe'
ld = 'lld-link.exe'
rc = 'llvm-rc.exe'
windres = 'llvm-rc.exe'

[constants]
# /O2 is the normal MSVC-style release optimization level. The /clang: flags
# forward LLVM driver options through clang-cl for this remark-capture build.
compiler_flags = ['/O2', '/arch:AVX2', '/Gw', '/Gy', '/Zc:inline', '/clang:-O3', '/clang:-fvectorize', '/clang:-fslp-vectorize', '/clang:-funroll-loops', '/clang:-Rpass=loop-vectorize|slp-vectorizer', '/clang:-Rpass-missed=loop-vectorize|slp-vectorizer', '/clang:-Rpass-analysis=loop-vectorize|slp-vectorizer', '/clang:-Rpass=inline', '/clang:-Rpass-missed=inline', '/clang:-Rpass-analysis=inline', '/clang:-fsave-optimization-record', '/clang:-foptimization-record-passes=loop-vectorize|slp-vectorizer|inline']

[built-in options]
c_args = compiler_flags
cpp_args = compiler_flags
b_lto = true
b_lto_mode = 'thin'
