name: Artifacts (Package)

on: [push, pull_request, workflow_dispatch]

jobs:
  artifacts-windows-clang:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      id: checkout-code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup glslangValidator
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/HansKristian-Work/vkd3d-proton-ci/main/glslangValidator.exe" -OutFile "glslangValidator.exe"
        Write-Output "$pwd" | Out-File -FilePath "${Env:GITHUB_PATH}" -Append

    - name: Setup Meson
      shell: pwsh
      run: pip install meson

    - name: Find Visual Studio
      shell: pwsh
      run: |
        $installationPath = Get-VSSetupInstance `
          | Select-VSSetupInstance -Require Microsoft.VisualStudio.Workload.NativeDesktop -Latest `
          | Select-Object -ExpandProperty InstallationPath
        Write-Output "VSDEVCMD=${installationPath}\Common7\Tools\VsDevCmd.bat" `
          | Out-File -FilePath "${Env:GITHUB_ENV}" -Append

    - name: Get version
      id: get-version
      shell: bash
      run: |
        echo "VERSION_NAME=${GITHUB_REF##*/}-${GITHUB_SHA##*/}" >> $GITHUB_ENV

    - name: Build Clang x64
      shell: pwsh
      run: |
        & "${Env:COMSPEC}" /s /c "`"${Env:VSDEVCMD}`" -arch=x64 -host_arch=x64 -no_logo && set" `
          | % { , ($_ -Split '=', 2) } `
          | % { [System.Environment]::SetEnvironmentVariable($_[0], $_[1]) }
        $Env:CC = "clang-cl"
        $Env:CXX = "clang-cl"
        meson setup build-clang-x64 --buildtype release --backend ninja -Denable_d3d8=false -Denable_d3d9=false -Denable_d3d10=false
        ninja -C build-clang-x64

    - name: Prepare artifacts
      shell: pwsh
      run: |
        mkdir artifacts\x64
        ls -Path build-clang-x64\src -Include *.dll,*.pdb -Recurse | cp -Destination (Join-Path -Path (pwd) -ChildPath artifacts\x64)

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dxvk-${{ env.VERSION_NAME }}-clang-package
        path: artifacts\*
