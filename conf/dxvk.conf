[Fallout4.exe]
# Cap frame rate to 60 FPS to prevent engine/physics bugs in Fallout 4 and ensure uniform frame pacing
dxgi.maxFrameRate = 60

# Minimize input lag/latency by limiting the queued frames to 1
dxgi.maxFrameLatency = 1

# Enable VSync (1) to sync frame presentation to monitor refresh rate and eliminate screen tearing
dxgi.syncInterval = 1

# Cache all dynamic buffers (constant, vertex, index) to significantly reduce CPU-bound rendering bottlenecks
d3d11.cachedDynamicResources = a

# Allow relaxed memory barriers to improve GPU execution overlap and performance
d3d11.relaxedBarriers = True

# Disable apitraceMode (debug mode) to ensure all runtime optimizations are active
d3d11.apitraceMode = False

# Enable raw shader storage buffer objects for more efficient shader execution
dxvk.useRawSsbo = True

# Use all available CPU threads for shader compilation to eliminate in-game compilation stutter
dxvk.numCompilerThreads = 0

# Limit maximum tessellation factor to improve performance in GPU-bound scenes
d3d11.maxTessFactor = 16

# DXVK Heads-Up Display configuration:
# - fps: Show the frame rate counter
# - simd: Show the experimental SIMD cycle performance overhead and breakdown
# - simd_graph=0: Disable the SIMD sparkline graph (default is 1)
# - simd_breakdown=0: Disable the detailed SIMD zone breakdown (default is 1)
#
# Examples:
#   dxvk.hud = fps,simd
#   dxvk.hud = simd,simd_graph=0
#   dxvk.hud = simd
#
dxvk.hud = fps,simd
