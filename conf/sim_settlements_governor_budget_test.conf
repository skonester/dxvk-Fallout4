[Fallout4.exe]
dxgi.maxFrameRate = 60
dxgi.maxFrameLatency = 1
dxgi.syncInterval = 1

d3d11.governorMode = True
d3d11.governorPacing = True

# Start here for the 39 -> 44 FPS test. This only allows small opaque
# depth-writing triangle draws to be skipped, and caps total skips per frame.
d3d11.governorDrawShedding = True
d3d11.governorDrawBudget = 6500
d3d11.governorMaxSkipsPerFrame = 500
d3d11.governorSkipMaxVertices = 24
d3d11.governorTargetPercent = 110
d3d11.governorRecoveryFrames = 30

d3d11.cachedDynamicResources = a
d3d11.relaxedBarriers = True
d3d11.maxTessFactor = 8
d3d11.samplerLodBias = 0.0

dxvk.useRawSsbo = True
dxvk.numCompilerThreads = 0

dxvk.hud = fps,drawcalls,simd,simd_graph=0,simd_breakdown=0

# Tune order for Sim Settlements:
# 1. 6500 budget, 500 max skips, 24 max vertices
# 2. 6000 budget, 700 max skips, 24 max vertices
# 3. 5500 budget, 900 max skips, 32 max vertices
#
# Avoid d3d11.drawPlateauMode for this test. It is the older compatibility path.
